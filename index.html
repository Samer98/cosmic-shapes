<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, composer, controls, bloomPass;
let dataNodes, trailSystem, bgStars;
let bloomTarget = 0.55, bloomCurrent = 0.55;
let time = 0;
let currentViz = 0;
let isTransforming = false;
let transformProgress = 0;
let frameCount = 0, lastFpsTime = performance.now(), fps = 60;
let autoRotate = true, dataFlow = true, showTrails = true;

const NODE_COUNT  = 24000;
const TRAIL_COUNT = 6000;
const TRANSFORM_SPEED = 0.018;

const VIZ_NAMES = ['Auroral Flow', 'Crystal Lattice', 'Plasma Dipole', 'Seeded Glyph'];
const BLOOM_STRENGTHS = [0.28, 0.55, 0.38, 0.44];

const PALETTES = [
  [
    new THREE.Color(0x5bd4f0), new THREE.Color(0x8be8ff),
    new THREE.Color(0x4fb8d0), new THREE.Color(0x7ec8e3),
    new THREE.Color(0x2da8c4), new THREE.Color(0xa8f5e8),
    new THREE.Color(0x6dd4c8), new THREE.Color(0xcef5ff)
  ],
  [
    new THREE.Color(0xe8d5ff), new THREE.Color(0xd0b4f5),
    new THREE.Color(0xffd5e8), new THREE.Color(0xf5c4d8),
    new THREE.Color(0xffffff), new THREE.Color(0xc8b4e8),
    new THREE.Color(0xffe8f5), new THREE.Color(0xb8a0d8)
  ],
  [
    new THREE.Color(0xff2a00), new THREE.Color(0xff6a00),
    new THREE.Color(0xffaa22), new THREE.Color(0xffdd66),
    new THREE.Color(0xffffff), new THREE.Color(0xff4400),
    new THREE.Color(0xff8800), new THREE.Color(0xffcc44)
  ],
  [
    new THREE.Color(0xb9d4ff), new THREE.Color(0xffffff),
    new THREE.Color(0x8be8ff), new THREE.Color(0xa8f5e8),
    new THREE.Color(0xffd5e8), new THREE.Color(0xd0b4f5),
    new THREE.Color(0xffcc44), new THREE.Color(0xff6a00)
  ]
];

function _hash(n) {
  return (Math.abs(Math.sin(n * 127.1 + 311.7) * 43758.5453)) % 1;
}

function genAuroralFlow(i, count) {
  const t = i / count;
  const bands = 12;
  const band = Math.floor(t * bands);
  const bt = (t * bands) % 1;

  const spread = 130;
  const x = (band / bands - 0.5) * spread;
  const z = Math.sin(band * 0.9) * 24;
  const y = (bt - 0.5) * 110;

  const wave1 = Math.sin(bt * Math.PI * 3 + band * 0.7) * (7 + band * 0.8);
  const wave2 = Math.cos(bt * Math.PI * 2 + band * 1.1) * 4;

  return new THREE.Vector3(x + wave2, y, z + wave1);
}

function genCrystalLattice(i, count) {
  const shells = 5;
  const shell = Math.floor((i / count) * shells);
  const shellT = (i / count * shells) % 1;

  const phi = Math.acos(1 - 2 * shellT);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  
  const r = 10 + shell * 14;
  const ripple = Math.sin(theta * 4) * Math.cos(phi * 4) * 0.8;

  return new THREE.Vector3(
    (r + ripple) * Math.sin(phi) * Math.cos(theta),
    (r + ripple) * Math.sin(phi) * Math.sin(theta),
    (r + ripple) * Math.cos(phi)
  );
}

function genPlasmaDipole(i, count) {
  const FIELD_FRAC = 0.45, DISK_FRAC = 0.38, JET_FRAC = 0.17;
  const fieldEnd = Math.floor(count * FIELD_FRAC);
  const diskEnd  = fieldEnd + Math.floor(count * DISK_FRAC);

  if (i < fieldEnd) {
    const LINES = 28;
    const lineIdx = Math.floor(i / (fieldEnd / LINES));
    const lt      = (i % Math.ceil(fieldEnd / LINES)) / Math.ceil(fieldEnd / LINES);

    const R0  = 14 + lineIdx * 3.8;
    const phi = (lineIdx / LINES) * Math.PI * 2 + lineIdx * 0.22;
    const lambda = (lt - 0.5) * Math.PI * 0.94;
    
    const cosL = Math.cos(lambda);
    const r = R0 * cosL * cosL;

    const scatter = (_hash(i * 3.1) - 0.5) * 1.2;
    const sAngle  = _hash(i * 7.7) * Math.PI * 2;

    return new THREE.Vector3(
      r * cosL * Math.cos(phi) + Math.cos(sAngle) * scatter * 0.5,
      r * Math.sin(lambda),
      r * cosL * Math.sin(phi) + Math.sin(sAngle) * scatter * 0.5
    );
  } else if (i < diskEnd) {
    const di = i - fieldEnd;
    const dt = di / (diskEnd - fieldEnd);

    const innerR = 10;
    const outerR = 68;
    const r = innerR * Math.pow(outerR / innerR, dt);
    const angle = dt * Math.PI * 14 + _hash(i * 2.3) * 0.6;

    const halfH = 3.5 * (1 - dt * 0.72) + _hash(i * 5.9) * 1.2;
    const y = (_hash(i * 8.1) * 2 - 1) * halfH;

    return new THREE.Vector3(r * Math.cos(angle), y, r * Math.sin(angle));
  } else {
    const ji = i - diskEnd;
    const half = Math.floor((count - diskEnd) / 2);
    const sign = ji < half ? 1 : -1;
    const jt = (ji % half) / half;

    const height = sign * jt * 78;
    const spread = jt * jt * 7.5;
    const twist = jt * Math.PI * 4;
    const angle = _hash(i * 4.3) * Math.PI * 2 + twist;
    const r = _hash(i * 9.1) * spread;

    const knotPull = Math.sin(jt * Math.PI * 6) * 0.4;

    return new THREE.Vector3(
      r * Math.cos(angle) * (1 + knotPull),
      height,
      r * Math.sin(angle) * (1 + knotPull)
    );
  }
}

const GENERATORS = [genAuroralFlow, genCrystalLattice, genPlasmaDipole];

let seededText = 'COSMIC';
let seededUserSeed = 1;
let seededForcedShape = 'auto'; // auto | sphere | torus | knot | helix | lissajous | superformula | shell | text
let seededCache = null; // Float32Array(NODE_COUNT*3)

function _u32(n) { return n >>> 0; }

function hashStringToU32(str) {
  // FNV-1a 32-bit
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function makePRNG(seedU32) {
  let s = _u32(seedU32 || 1);
  return function rand01() {
    // LCG
    s = _u32(Math.imul(s, 1664525) + 1013904223);
    return s / 4294967296;
  };
}

function mix32(n) {
  // Stateless 32-bit mix for deterministic parameter extraction.
  let x = _u32(n);
  x ^= x >>> 16;
  x = Math.imul(x, 0x7feb352d);
  x ^= x >>> 15;
  x = Math.imul(x, 0x846ca68b);
  x ^= x >>> 16;
  return _u32(x);
}

function unitFromU32(n) {
  return mix32(n) / 4294967295;
}

function buildTextPoints(text, rand01) {
  const txt = (text || 'COSMIC').trim().slice(0, 32) || 'COSMIC';
  const c = document.createElement('canvas');
  c.width = 520; c.height = 220;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, c.width, c.height);

  const fontFamily = (getComputedStyle(document.body).fontFamily || 'DM Sans, sans-serif');
  const fontSize = 132;
  ctx.font = `700 ${fontSize}px ${fontFamily}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(txt, c.width / 2, c.height / 2 + 6);

  const w = c.width, h = c.height;
  const img = ctx.getImageData(0, 0, w, h).data;
  const alphaAt = (x, y) => img[(y * w + x) * 4 + 3];
  const pts = [];
  const edge = [];

  for (let y = 1; y < h - 1; y += 1) {
    for (let x = 1; x < w - 1; x += 1) {
      const a = alphaAt(x, y);
      if (a <= 40) continue;
      pts.push([x, y]);
      const isEdge =
        alphaAt(x - 1, y) <= 40 ||
        alphaAt(x + 1, y) <= 40 ||
        alphaAt(x, y - 1) <= 40 ||
        alphaAt(x, y + 1) <= 40;
      if (isEdge) edge.push([x, y]);
    }
  }

  const pick = edge.length ? edge : pts;
  if (!pick.length) return null;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const [x, y] of pick) {
    if (x < minX) minX = x;
    if (y < minY) minY = y;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const bw = Math.max(1, maxX - minX);
  const bh = Math.max(1, maxY - minY);
  const scale = 118 / Math.max(bw, bh);

  const out = new Float32Array(NODE_COUNT * 3);
  for (let i = 0; i < NODE_COUNT; i++) {
    const idx = (i * 131 + Math.floor(rand01() * 17)) % pick.length;
    const [px, py] = pick[idx];
    out[i * 3] = (px - cx) * scale;
    out[i * 3 + 1] = -(py - cy) * scale;
    out[i * 3 + 2] = 0;
  }
  return out;
}

function buildSeededShape(rand01) {
  // Deterministic geometric profiles driven by text+seed.
  const TAU = Math.PI * 2;
  const textHash = hashStringToU32(seededText);
  const seedHash = _u32(seededUserSeed || 1);
  const profileHash = mix32(textHash ^ Math.imul(seedHash, 0x9e3779b1));
  const choices = ['superformula', 'lissajous', 'knot', 'torus', 'helix', 'sphere', 'shell', 'text'];
  const forced = String(seededForcedShape || 'auto').toLowerCase().trim();
  const choice = choices.includes(forced) ? forced : choices[profileHash % choices.length];

  const jitter = 0.8 + unitFromU32(profileHash + 101) * 3.1;
  const base = 48 + unitFromU32(profileHash + 211) * 26;
  const phaseA = TAU * unitFromU32(profileHash + 17);
  const phaseB = TAU * unitFromU32(profileHash + 23);
  const warpA = 2 + Math.floor(unitFromU32(profileHash + 31) * 7);
  const warpB = 2 + Math.floor(unitFromU32(profileHash + 37) * 9);
  const out = new Float32Array(NODE_COUNT * 3);

  if (choice === 'text') {
    const pts = buildTextPoints(seededText, rand01);
    if (pts) return pts;
  }

  function superR(angle, m, n1, n2, n3) {
    const t1 = Math.pow(Math.abs(Math.cos((m * angle) / 4)), n2);
    const t2 = Math.pow(Math.abs(Math.sin((m * angle) / 4)), n3);
    const den = Math.pow(t1 + t2, 1 / Math.max(0.05, n1));
    return den === 0 ? 0 : 1 / den;
  }

  for (let i = 0; i < NODE_COUNT; i++) {
    const u = (i * 0.61803398875 + unitFromU32(profileHash + i * 3 + 43)) % 1;
    const v = (i + 0.5 + unitFromU32(profileHash + i * 5 + 59)) / NODE_COUNT;
    const theta = TAU * u;
    const phi = (v - 0.5) * Math.PI * 0.98;
    let x = 0, y = 0, z = 0;

    if (choice === 'sphere') {
      const radialWarp = 0.86 + 0.2 * Math.sin(theta * warpA + phaseA) * Math.cos(phi * warpB + phaseB);
      const r = base * radialWarp + (rand01() - 0.5) * jitter;
      x = r * Math.cos(phi) * Math.cos(theta);
      y = r * Math.sin(phi);
      z = r * Math.cos(phi) * Math.sin(theta);
    } else if (choice === 'torus') {
      const a = theta;
      const b = TAU * v * (2 + Math.floor(unitFromU32(profileHash + 71) * 3));
      const R = base + 6 + unitFromU32(profileHash + 73) * 12;
      const r = 9 + unitFromU32(profileHash + 79) * 14;
      const ripple = 1 + 0.18 * Math.cos(warpA * a + warpB * b + phaseA);
      x = (R + r * Math.cos(b) * ripple) * Math.cos(a);
      y = r * Math.sin(b);
      z = (R + r * Math.cos(b) * ripple) * Math.sin(a);
    } else if (choice === 'helix') {
      const turns = 3 + Math.floor(unitFromU32(profileHash + 83) * 5);
      const t = TAU * (v * turns);
      const r = 26 + unitFromU32(profileHash + 89) * 32;
      const pitch = 8 + unitFromU32(profileHash + 97) * 13;
      const radialWave = 1 + 0.25 * Math.sin(warpA * t + phaseB);
      x = r * Math.cos(t);
      z = r * Math.sin(t);
      y = (v - 0.5) * (pitch * 12);
      x *= radialWave;
      z *= radialWave;
      const wob = (rand01() - 0.5) * jitter;
      x += wob;
      z -= wob;
    } else if (choice === 'knot') {
      const t = TAU * v;
      const p = 2 + Math.floor(unitFromU32(profileHash + 103) * 5);
      const q = 3 + Math.floor(unitFromU32(profileHash + 107) * 6);
      const R = 36 + unitFromU32(profileHash + 109) * 26;
      const r = 10 + unitFromU32(profileHash + 113) * 16;
      const cq = Math.cos(q * t), sq = Math.sin(q * t);
      const cp = Math.cos(p * t), sp = Math.sin(p * t);
      const baseX = (R + r * cq) * cp;
      const baseY = (R + r * cq) * sp;
      const baseZ = r * sq;
      const j = (rand01() - 0.5) * jitter * 1.6;
      x = baseX + j;
      y = baseY - j;
      z = baseZ + (rand01() - 0.5) * jitter;
    } else if (choice === 'lissajous') {
      const t = TAU * v;
      const ax = 2 + Math.floor(unitFromU32(profileHash + 127) * 7);
      const ay = 3 + Math.floor(unitFromU32(profileHash + 131) * 7);
      const az = 4 + Math.floor(unitFromU32(profileHash + 137) * 7);
      const A = base * (0.7 + unitFromU32(profileHash + 139) * 0.35);
      const B = base * (0.6 + unitFromU32(profileHash + 149) * 0.4);
      const C = base * (0.55 + unitFromU32(profileHash + 151) * 0.45);
      x = A * Math.sin(ax * t + phaseA);
      y = B * Math.sin(ay * t + phaseB);
      z = C * Math.sin(az * t + phaseA * 0.5);
    } else if (choice === 'superformula') {
      const m1 = 3 + Math.floor(unitFromU32(profileHash + 157) * 10);
      const m2 = 2 + Math.floor(unitFromU32(profileHash + 163) * 11);
      const n11 = 0.4 + unitFromU32(profileHash + 167) * 6.2;
      const n12 = 0.4 + unitFromU32(profileHash + 173) * 6.6;
      const n13 = 0.4 + unitFromU32(profileHash + 179) * 6.6;
      const n21 = 0.4 + unitFromU32(profileHash + 181) * 6.2;
      const n22 = 0.4 + unitFromU32(profileHash + 191) * 6.6;
      const n23 = 0.4 + unitFromU32(profileHash + 193) * 6.6;
      const r1 = superR(theta - Math.PI, m1, n11, n12, n13);
      const r2 = superR(phi, m2, n21, n22, n23);
      const s = base * 0.95;
      x = s * r1 * Math.cos(theta) * r2 * Math.cos(phi);
      y = s * r2 * Math.sin(phi);
      z = s * r1 * Math.sin(theta) * r2 * Math.cos(phi);
    } else {
      // shell / spiral manifold
      const t = TAU * (v * (3 + Math.floor(unitFromU32(profileHash + 199) * 5)));
      const grow = 10 + v * (base * 1.1);
      const ridge = 1 + 0.22 * Math.sin(t * warpA + phaseB);
      const pinch = 0.25 + 0.75 * v;
      x = grow * Math.cos(t) * ridge;
      z = grow * Math.sin(t) * ridge;
      y = (v - 0.5) * (base * 1.35) + Math.sin(t * warpB + phaseA) * base * 0.08;
      x *= pinch;
      z *= pinch;
    }

    out[i * 3] = x;
    out[i * 3 + 1] = y;
    out[i * 3 + 2] = z;
  }
  return out;
}

function tokenizeFormula(input) {
  const s = String(input ?? '').trim();
  if (!s) return [];
  // Split by whitespace, but keep quoted strings intact.
  const out = [];
  let cur = '';
  let q = null;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (q) {
      if (ch === q) { q = null; continue; }
      cur += ch;
      continue;
    }
    if (ch === '"' || ch === "'") { q = ch; continue; }
    if (/\s/.test(ch)) {
      if (cur) out.push(cur);
      cur = '';
      continue;
    }
    cur += ch;
  }
  if (cur) out.push(cur);
  return out;
}

function parseForgeFormula(raw) {
  // Accept either plain text OR a key-value "formula".
  // Examples:
  //   COSMIC
  //   text="HELLO WORLD" seed=42 shape=torus
  //   shape=text text=NEBULA seed=7
  const src = String(raw ?? '').trim();
  const tokens = tokenizeFormula(src);
  const looksLikeFormula = tokens.some(t => t.includes('=')) || /^shape\(/i.test(src);

  if (!looksLikeFormula) {
    return { text: src.slice(0, 32) || 'COSMIC', seed: null, shape: null };
  }

  const kv = {};
  for (const t of tokens) {
    const eq = t.indexOf('=');
    if (eq <= 0) continue;
    const k = t.slice(0, eq).toLowerCase().trim();
    const v = t.slice(eq + 1).trim();
    if (!k) continue;
    kv[k] = v;
  }

  const text = (kv.text ?? kv.t ?? '').trim();
  const shape = (kv.shape ?? kv.s ?? '').trim();
  const seedStr = (kv.seed ?? kv.r ?? '').trim();

  let seed = null;
  if (seedStr) {
    const seedNum = Number.parseInt(seedStr, 10);
    seed = Number.isFinite(seedNum) ? (seedNum >>> 0) : null;
  }

  return {
    text: (text || 'COSMIC').slice(0, 32),
    seed,
    shape: shape ? shape.toLowerCase() : null
  };
}

function genSeededGlyph(i) {
  if (!seededCache) {
    const seedU32 = _u32(hashStringToU32(seededText) ^ _u32(seededUserSeed));
    const rand01 = makePRNG(seedU32 || 1);
    seededCache = buildSeededShape(rand01);
  }
  if (!seededCache) return new THREE.Vector3(0, 0, 0);
  const ix = i * 3;
  return new THREE.Vector3(seededCache[ix], seededCache[ix + 1], seededCache[ix + 2]);
}

GENERATORS.push(genSeededGlyph);

function assignProps(i, colors, sizes, vizIdx) {
  const pal = PALETTES[vizIdx];
  let color, brightness;

  if (vizIdx === 0) {
    const band = Math.floor((i / NODE_COUNT) * 12);
    color = pal[band % pal.length];
    brightness = 0.6 + Math.random() * 0.7;
    sizes[i] = 0.5 + Math.random() * 2.2;
  } else if (vizIdx === 1) {
    const shell = Math.floor((i / NODE_COUNT) * 5);
    color = pal[shell % pal.length];
    brightness = 0.7 + Math.random() * 0.6;
    sizes[i] = 0.5 + Math.random() * 1.8;
  } else if (vizIdx === 2) {
    const FIELD_END = Math.floor(NODE_COUNT * 0.45);
    const DISK_END  = FIELD_END + Math.floor(NODE_COUNT * 0.38);
    if (i < FIELD_END) {
      color = pal[i % 2 === 0 ? 0 : 5];
      brightness = 0.45 + Math.random() * 0.45;
      sizes[i] = 0.4 + Math.random() * 1.4;
    } else if (i < DISK_END) {
      const dt = (i - FIELD_END) / (DISK_END - FIELD_END);
      color = pal[2 + Math.floor(dt * 3)];
      brightness = (0.5 + dt * 0.65) * (0.8 + Math.random() * 0.4);
      sizes[i] = 0.35 + Math.random() * 1.5;
    } else {
      color = pal[4];
      brightness = 0.85 + Math.random() * 0.5;
      sizes[i] = 0.6 + Math.random() * 2.0;
    }
  } else {
    color = pal[i % pal.length];
    brightness = 0.55 + Math.random() * 0.75;
    sizes[i] = 0.55 + Math.random() * 2.0;
  }

  colors[i*3]   = color.r * brightness;
  colors[i*3+1] = color.g * brightness;
  colors[i*3+2] = color.b * brightness;
}

function makeParticleTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,    'rgba(255,255,255,1.0)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.85)');
  g.addColorStop(0.4,  'rgba(200,230,255,0.35)');
  g.addColorStop(0.75, 'rgba(180,210,255,0.08)');
  g.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
}

function makeTrailTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 32;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(16,16,0,16,16,16);
  g.addColorStop(0,  'rgba(255,255,255,0.7)');
  g.addColorStop(0.5,'rgba(255,255,255,0.2)');
  g.addColorStop(1,  'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,32,32);
  const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
}

function buildDataNodes() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(NODE_COUNT * 3);
  const col = new Float32Array(NODE_COUNT * 3);
  const siz = new Float32Array(NODE_COUNT);

  for (let i = 0; i < NODE_COUNT; i++) {
    const p = GENERATORS[currentViz](i, NODE_COUNT);
    pos[i*3] = p.x; pos[i*3+1] = p.y; pos[i*3+2] = p.z;
    assignProps(i, col, siz, currentViz);
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(siz, 1));
  geo.userData.currentColors = new Float32Array(col);

  const mat = new THREE.PointsMaterial({
    size: 3.0, map: makeParticleTexture(),
    vertexColors: true, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  dataNodes = new THREE.Points(geo, mat);
  scene.add(dataNodes);
}

function buildTrails() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(TRAIL_COUNT * 3);
  const col = new Float32Array(TRAIL_COUNT * 3);
  const siz = new Float32Array(TRAIL_COUNT);

  const pal = PALETTES[currentViz];
  for (let i = 0; i < TRAIL_COUNT; i++) {
    pos[i*3]   = (Math.random()-0.5)*120;
    pos[i*3+1] = (Math.random()-0.5)*100;
    pos[i*3+2] = (Math.random()-0.5)*120;
    const c = pal[Math.floor(Math.random()*pal.length)];
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
    siz[i] = Math.random()*1.5 + 0.3;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(siz, 1));

  const mat = new THREE.PointsMaterial({
    size: 1.5, map: makeTrailTexture(),
    vertexColors: true, transparent: true, opacity: 0.45,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  trailSystem = new THREE.Points(geo, mat);
  scene.add(trailSystem);
}

function buildBgStars() {
  const geo = new THREE.BufferGeometry();
  const N = 3000;
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  for (let i = 0; i < N; i++) {
    const r = 250 + Math.random()*350;
    const phi = Math.random()*Math.PI*2;
    const th = Math.random()*Math.PI;
    pos[i*3]   = r*Math.sin(th)*Math.cos(phi);
    pos[i*3+1] = r*Math.sin(th)*Math.sin(phi);
    pos[i*3+2] = r*Math.cos(th);
    const v = 0.08 + Math.random()*0.18;
    col[i*3] = v*0.7; col[i*3+1] = v*0.85; col[i*3+2] = v;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size:0.8, vertexColors:true, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending, depthWrite:false });
  bgStars = new THREE.Points(geo, mat);
  scene.add(bgStars);
}

function init() {
  scene  = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050608, 0.0008);

  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 20, 130);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  document.getElementById('container').appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.rotateSpeed = 0.5;
  controls.zoomSpeed = 0.8;
  controls.minDistance = 30;
  controls.maxDistance = 350;
  controls.enablePan = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.25;

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.55, 0.45, 0.8);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());

  buildDataNodes();
  buildTrails();
  buildBgStars();
  setupEvents();
  animate();
}

function animateFlow() {
  if (!dataNodes || isTransforming || !dataFlow) return;
  const pos = dataNodes.geometry.attributes.position.array;

  if (currentViz === 0) {
    for (let i = 0; i < NODE_COUNT; i++) {
      pos[i*3+1] += 0.28;
      if (pos[i*3+1] > 55) pos[i*3+1] -= 110;
      pos[i*3]   += Math.sin(time*1.5 + i*0.04) * 0.03;
      pos[i*3+2] += Math.cos(time*1.2 + i*0.04) * 0.03;
    }
  } else if (currentViz === 1) {
    for (let i = 0; i < NODE_COUNT; i++) {
      const shell = Math.floor((i/NODE_COUNT)*5);
      const sp = 0.004 + shell*0.002;
      const x = pos[i*3], z = pos[i*3+2];
      pos[i*3]   = x*Math.cos(sp) - z*Math.sin(sp);
      pos[i*3+2] = x*Math.sin(sp) + z*Math.cos(sp);
    }
  } else {
    const FIELD_END = Math.floor(NODE_COUNT * 0.45);
    const DISK_END  = FIELD_END + Math.floor(NODE_COUNT * 0.38);
    for (let i = 0; i < NODE_COUNT; i++) {
      const x = pos[i*3], z = pos[i*3+2];
      
      if (i < FIELD_END) {
        const sp = 0.0012;
        pos[i*3]   = x*Math.cos(sp) - z*Math.sin(sp);
        pos[i*3+2] = x*Math.sin(sp) + z*Math.cos(sp);
      } else if (i < DISK_END) {
        const r = Math.sqrt(x*x + z*z) || 1;
        const sp = 0.012 / Math.sqrt(r / 10);
        pos[i*3]   = x*Math.cos(sp) - z*Math.sin(sp);
        pos[i*3+2] = x*Math.sin(sp) + z*Math.cos(sp);
      } else {
        const sign = pos[i*3+1] >= 0 ? 1 : -1;
        pos[i*3+1] += 0.22 * sign;
        const limit = 80;
        
        if (Math.abs(pos[i*3+1]) > limit) {
          pos[i*3+1] = sign * 1.5;
          pos[i*3]   = (_hash(i + time*10) - 0.5) * 2.5;
          pos[i*3+2] = (_hash(i * 2.1 + time*10) - 0.5) * 2.5;
        }
        
        const r2 = Math.sqrt(x*x + z*z) || 0.001;
        const jt = Math.abs(pos[i*3+1]) / limit;
        pos[i*3]   += (x/r2) * jt * 0.06;
        pos[i*3+2] += (z/r2) * jt * 0.06;
      }
    }
  }
  dataNodes.geometry.attributes.position.needsUpdate = true;
}

function animateTrails() {
  if (!trailSystem || !showTrails) return;
  const pos = trailSystem.geometry.attributes.position.array;
  for (let i = 0; i < TRAIL_COUNT; i++) {
    const ix = i*3, iy=ix+1, iz=ix+2;
    
    if (currentViz === 0) {
      pos[iy] += 0.35;
      if (pos[iy] > 55) pos[iy] = -55;
      pos[ix] += Math.sin(time*2 + i*0.08)*0.08;
      pos[iz] += Math.cos(time*1.7 + i*0.08)*0.08;
    } else if (currentViz === 1) {
      const sp = 0.007 + (i%4)*0.003;
      const x=pos[ix], z=pos[iz];
      pos[ix] = x*Math.cos(sp)-z*Math.sin(sp);
      pos[iz] = x*Math.sin(sp)+z*Math.cos(sp);
    } else {
      const x=pos[ix], z=pos[iz];
      const r = Math.sqrt(x*x+z*z) || 1;
      const sp = 0.010 / Math.sqrt(r/10);
      pos[ix] = x*Math.cos(sp)-z*Math.sin(sp);
      pos[iz] = x*Math.sin(sp)+z*Math.cos(sp);
      pos[iy] += (i%2===0 ? 0.18 : -0.18);
      if (Math.abs(pos[iy]) > 65) pos[iy] *= -0.05;
    }
  }
  trailSystem.geometry.attributes.position.needsUpdate = true;
}

function startTransform(nextViz) {
  isTransforming = true;
  transformProgress = 0;

  const pos = dataNodes.geometry.attributes.position.array;
  const col = dataNodes.geometry.attributes.color.array;
  const siz = dataNodes.geometry.attributes.size.array;

  const fromPos = new Float32Array(pos);
  const fromCol = new Float32Array(dataNodes.geometry.userData.currentColors);
  const fromSiz = new Float32Array(siz);

  const toPos = new Float32Array(NODE_COUNT*3);
  const toCol = new Float32Array(NODE_COUNT*3);
  const toSiz = new Float32Array(NODE_COUNT);

  for (let i = 0; i < NODE_COUNT; i++) {
    const p = GENERATORS[nextViz](i, NODE_COUNT);
    toPos[i*3]=p.x; toPos[i*3+1]=p.y; toPos[i*3+2]=p.z;
    assignProps(i, toCol, toSiz, nextViz);
  }

  dataNodes.userData = { fromPos, toPos, fromCol, toCol, fromSiz, toSiz, targetViz: nextViz };

  const pal = PALETTES[nextViz];
  const tc = trailSystem.geometry.attributes.color.array;
  for (let i = 0; i < TRAIL_COUNT; i++) {
    const c = pal[Math.floor(Math.random()*pal.length)];
    tc[i*3]=c.r; tc[i*3+1]=c.g; tc[i*3+2]=c.b;
  }
  trailSystem.geometry.attributes.color.needsUpdate = true;
}

function updateFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = Math.round(frameCount*1000/(now-lastFpsTime));
    document.getElementById('fps-display').textContent = fps;
    frameCount = 0; lastFpsTime = now;
  }
}

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;
  updateFps();
  controls.update();

  bloomTarget = BLOOM_STRENGTHS[currentViz];
  bloomCurrent += (bloomTarget - bloomCurrent) * 0.04;
  if (bloomPass) bloomPass.strength = bloomCurrent;

  if (bgStars) { bgStars.rotation.y += 0.0002; bgStars.rotation.x += 0.00008; }

  if (isTransforming) {
    transformProgress += TRANSFORM_SPEED;
    const ud = dataNodes.userData;
    const pos = dataNodes.geometry.attributes.position.array;
    const col = dataNodes.geometry.attributes.color.array;
    const siz = dataNodes.geometry.attributes.size.array;

    if (transformProgress >= 1) {
      pos.set(ud.toPos); col.set(ud.toCol); siz.set(ud.toSiz);
      dataNodes.geometry.userData.currentColors = new Float32Array(ud.toCol);
      currentViz = ud.targetViz;
      isTransforming = false; transformProgress = 0;
    } else {
      const t = transformProgress;
      const e = t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
      for (let i=0; i<pos.length; i++) {
        pos[i] = ud.fromPos[i]*(1-e) + ud.toPos[i]*e;
        col[i] = ud.fromCol[i]*(1-e) + ud.toCol[i]*e;
      }
      for (let i=0; i<siz.length; i++) siz[i]=ud.fromSiz[i]*(1-e)+ud.toSiz[i]*e;
    }
    dataNodes.geometry.attributes.position.needsUpdate = true;
    dataNodes.geometry.attributes.color.needsUpdate = true;
    dataNodes.geometry.attributes.size.needsUpdate = true;
  } else {
    animateFlow();
  }

  animateTrails();
  composer.render();
}

function setupEvents() {
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });

  function makePill(id, getState, setState, labelEl) {
    const el = document.getElementById(id);
    el.addEventListener('click', () => {
      setState(!getState());
      el.classList.toggle('active', getState());
      if (labelEl) labelEl();
    });
  }

  makePill('flow-pill',
    ()=>dataFlow,
    v=>{ dataFlow=v; }
  );
  makePill('trails-pill',
    ()=>showTrails,
    v=>{
      showTrails=v;
      if(trailSystem) trailSystem.visible=v;
      document.getElementById('trail-display').textContent = v ? 'On' : 'Off';
    }
  );

  document.getElementById('execute-btn').addEventListener('click', () => {
    if (isTransforming) return;
    const next = (currentViz+1) % GENERATORS.length;
    startTransform(next);
    const name = VIZ_NAMES[next];
    document.getElementById('mode-display').textContent = name;
  });

  const forgeForm = document.getElementById('forge-form');
  const forgeTextEl = document.getElementById('forge-text');
  const forgeSeedEl = document.getElementById('forge-seed');

  function applySeeded() {
    const raw = (forgeTextEl?.value ?? '').trim();
    const parsed = parseForgeFormula(raw);
    seededText = (parsed.text || 'COSMIC').trim().slice(0, 32) || 'COSMIC';

    const seedFromInput = Number.parseInt(String(forgeSeedEl?.value ?? '1'), 10);
    const seedNum = parsed.seed ?? (Number.isFinite(seedFromInput) ? seedFromInput : 1);
    seededUserSeed = (seedNum >>> 0) || 1;

    seededForcedShape = parsed.shape || 'auto';
    seededCache = null;

    const vizIdx = 3;
    if (!isTransforming) {
      startTransform(vizIdx);
      document.getElementById('mode-display').textContent = VIZ_NAMES[vizIdx];
    }
  }

  forgeForm.addEventListener('submit', (e) => {
    e.preventDefault();
    applySeeded();
  });

  const toggle = document.getElementById('controls-toggle');
  const panel  = document.getElementById('control-panel');
  toggle.addEventListener('click', () => panel.classList.toggle('expanded'));
}

window.addEventListener('load', init);
</script>
